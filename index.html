<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Между нами</title>

<style>
body {
    margin:0;
    min-height:100vh;
    background:linear-gradient(135deg,#f9d7e3,#fff4f7);
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container {
    width:90%;
    max-width:420px;
    text-align:center;
}

h1 {
    font-size:38px;
    color:#8b3a62;
}

.subtitle {
    color:#666;
}
.card {
    background:white;
    border-radius:30px;
    padding:35px 25px;
    margin:25px 0;
    box-shadow:0 15px 40px rgba(0,0,0,0.12);
    animation: cardShow 0.5s ease;
    min-height:220px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}
@keyframes cardShow {

from {
    opacity:0;
    transform:translateY(20px) scale(0.95);
}

to {
    opacity:1;
    transform:translateY(0) scale(1);
}
}   
.card.change {
    animation: cardFlip 0.4s ease;
}

@keyframes cardFlip {

from {
    opacity:0;
    transform:rotateY(90deg);
}

to {
    opacity:1;
    transform:rotateY(0deg);
}
}
.category {
    color:#b05a7a;
    font-weight:bold;
    margin-bottom:20px;
}

.question {
    font-size:22px;
    line-height:1.5;
}


#progress{
width:100%;
height:10px;
background:#f0d6df;
border-radius:10px;
margin-top:18px;
overflow:hidden;
}

#progressFill{
width:0%;
height:100%;
background:#d85b91;
transition:0.4s;
}

button {

    width:100%;
    padding:16px;
    margin:8px 0;
    border:0;
    border-radius:18px;
    background:#8b3a62;
    color:white;
    font-size:18px;
}

button:active {
    transform:scale(.97);
}

.hidden {
    display:none;
}

.category-btn {
    background:#ffffff;
    color:#8b3a62;
    border:2px solid #8b3a62;
}

</style>

</head>

<body>

<div class="container">

<div id="start">

<h1>Между нами ❤️</h1>

<p class="subtitle">
Игра, которая помогает стать ближе
</p>

<button onclick="showCategories()">
Начать игру
</button>

</div>


<div id="categories" class="hidden">

<h1>Выбери тему</h1>

<button class="category-btn" onclick="startGame('feelings')">
💗 Чувства
</button>

<button class="category-btn" onclick="startGame('dreams')">
✨ Мечты
</button>

<button class="category-btn" onclick="startGame('honest')">
🌙 Откровенно
</button>

<button class="category-btn" onclick="startGame('fun')">
😄 Весёлые
</button>
    
<button class="category-btn" onclick="startGame('mix')">
🎲 Микс
</button>
</div>


<div id="game" class="hidden">

<div class="card" id="card">

<div class="category" id="category">
</div>

<div class="question" id="question">
</div>

<div id="counter">
</div>
<div id="progress">
<div id="progressFill"></div>
</div>
</div>

<button onclick="nextQuestion()">
Следующий вопрос →
</button>

<button onclick="saveQuestion()">
❤️ Сохранить вопрос
</button>

<button onclick="showCategories()">
← Выбрать другую тему
</button>

</div>

</div>


<script src="questions.js"></script>
    
<script>
    

let currentCategory = "";
let currentIndex = 0;

function showCategories(){

document.getElementById("start").classList.add("hidden");

document.getElementById("categories").classList.remove("hidden");

}

function startGame(category){

currentCategory = category;
if(category === "mix"){

let allQuestions = [];

for(let key in cards){

allQuestions = allQuestions.concat(cards[key]);

}

cards.mix = allQuestions;

}

cards[currentCategory] = cards[currentCategory]
.sort(() => Math.random() - 0.5);

currentIndex = 0;

document.getElementById("categories").classList.add("hidden");

document.getElementById("game").classList.remove("hidden");

showQuestion();

}
let savedQuestions = [];

function saveQuestion(){

savedQuestions.push(cards[currentCategory][currentIndex]);

alert("❤️ Вопрос сохранён!");

}
function showQuestion(){

let question =
cards[currentCategory][currentIndex];

let categoryNames = {
feelings: "💗 Чувства",
dreams: "✨ Мечты",
honest: "🌙 Откровенно",
fun: "😄 Весёлые",
 mix: "🎲 Микс"   
};

document.getElementById("category").innerHTML =
categoryNames[currentCategory];
document.getElementById("question").innerHTML =
question;
document.getElementById("counter").innerHTML =
"Вопрос " + (currentIndex + 1) + " из " + cards[currentCategory].length;
let percent =
((currentIndex + 1) / cards[currentCategory].length) * 100;

document.getElementById("progressFill").style.width =
percent + "%";
}


function nextQuestion(){

currentIndex++;

if(currentIndex >= cards[currentCategory].length){

currentIndex = 0;

}

showQuestion();

}
</script>  
    
 
    

    
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Между нами</title>

<style>
body {
    margin:0;
    min-height:100vh;
    background:linear-gradient(135deg,#f9d7e3,#fff4f7);
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container {
    width:90%;
    max-width:420px;
    text-align:center;
}

h1 {
    font-size:38px;
    color:#8b3a62;
}

.subtitle {
    color:#666;
}

.card {
    background:white;
    border-radius:25px;
    padding:30px 20px;
    margin:25px 0;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

.category {
    color:#b05a7a;
    font-weight:bold;
    margin-bottom:20px;
}

.question {
    font-size:22px;
    line-height:1.5;
}

button {
    width:100%;
    padding:16px;
    margin:8px 0;
    border:0;
    border-radius:18px;
    background:#8b3a62;
    color:white;
    font-size:18px;
}

button:active {
    transform:scale(.97);
}

.hidden {
    display:none;
}

.category-btn {
    background:#ffffff;
    color:#8b3a62;
    border:2px solid #8b3a62;
}

</style>

</head>

<body>

<div class="container">

<div id="start">

<h1>Между нами ❤️</h1>

<p class="subtitle">
Игра, которая помогает стать ближе
</p>

<button onclick="showCategories()">
Начать игру
</button>

</div>


<div id="categories" class="hidden">

<h1>Выбери тему</h1>

<button class="category-btn" onclick="startGame('feelings')">
💗 Чувства
</button>

<button class="category-btn" onclick="startGame('dreams')">
✨ Мечты
</button>

<button class="category-btn" onclick="startGame('honest')">
🌙 Откровенно
</button>

<button class="category-btn" onclick="startGame('fun')">
😄 Весёлые
</button>

</div>


<div id="game" class="hidden">

<div class="card" id="card">

<div class="category" id="category">
</div>

<div class="question" id="question">
</div>

<div id="counter">
</div>

</div>

<button onclick="nextQuestion()">
Следующий вопрос →
</button>

<button onclick="showCategories()">
← Выбрать другую тему
</button>

</div>

</div>


<script src="questions.js"></script>
    
<script>
    

let currentCategory = "";
let currentIndex = 0;

function showCategories(){

document.getElementById("start").classList.add("hidden");

document.getElementById("categories").classList.remove("hidden");

}

function startGame(category){

currentCategory = category;

cards[currentCategory] = cards[currentCategory]
.sort(() => Math.random() - 0.5);

currentIndex = 0;

document.getElementById("categories").classList.add("hidden");

document.getElementById("game").classList.remove("hidden");

showQuestion();

}

function showQuestion(){

let question =
cards[currentCategory][currentIndex];

let categoryNames = {
feelings: "💗 Чувства",
dreams: "✨ Мечты",
honest: "🌙 Откровенно",
fun: "😄 Весёлые"
};

document.getElementById("category").innerHTML =
categoryNames[currentCategory];
document.getElementById("question").innerHTML =
question;
document.getElementById("counter").innerHTML =
"Вопрос " + (currentIndex + 1) + " из " + cards[currentCategory].length;
}


function nextQuestion(){

currentIndex++;

if(currentIndex >= cards[currentCategory].length){

currentIndex = 0;

}

showQuestion();

}
</script>  
    
 
    

    
</body>
</html>
